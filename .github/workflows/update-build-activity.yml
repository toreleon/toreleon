name: Update README build activity

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-build-activity
  cancel-in-progress: true

jobs:
  update-build-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch latest public activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_USERNAME: ${{ github.repository_owner }}
          MAX_PROJECTS: "4"
          EXCLUDED_REPOSITORIES: toreleon/toreleon.github.io,toreleon/resume
        run: node .github/scripts/update-build-activity.mjs

      - name: Commit README changes
        run: |
          if git diff --quiet -- README.md; then
            echo "README is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh build activity"
          git push
